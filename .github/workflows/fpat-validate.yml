name: FPAT Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-fpat-artifacts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate FPAT artifacts
        run: node scripts/fpat/validate-issues.mjs

      - name: Test continuation negotiation band
        run: node scripts/fpat/test-negotiation-band.mjs

      - name: Check /fpat-continuation doc consistency
        run: node scripts/fpat/check-doc-consistency.mjs

      - name: Lint application
        run: npm run lint

      - name: Build application
        run: npm run build

